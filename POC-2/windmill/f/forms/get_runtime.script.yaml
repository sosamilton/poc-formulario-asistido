summary: Obtener runtime del formulario
description: Obtiene el schema y configuración activa de un formulario
kind: script
language: bun
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    slug:
      type: string
      description: Slug del formulario
    version:
      type: integer
      description: Versión específica (opcional, usa active_version si no se especifica)
  required:
    - slug
