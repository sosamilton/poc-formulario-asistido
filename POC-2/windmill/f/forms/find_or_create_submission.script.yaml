summary: Find or create submission for CUIT and form
description: |-
  Busca un submission existente en estado 'draft' para el CUIT y form_id dados.
  Si existe, lo actualiza con los nuevos datos.
  Si no existe o todos están 'completed', crea uno nuevo.

schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    form_id:
      type: string
      description: ID del formulario
    version:
      type: integer
      description: Versión del formulario
    cuit:
      type: string
      description: CUIT del contribuyente
    data:
      type: object
      description: Datos del formulario (schema transformado)
    metadata:
      type: object
      description: Metadata adicional (datos de APIs, etc)
  required:
    - form_id
    - version
    - cuit
    - data
