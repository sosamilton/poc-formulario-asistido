summary: Initialize form workflow
description: Loads form schema, executes preload hooks, and creates draft submission

value:
  modules:
    - id: get_runtime
      value:
        type: script
        path: f/formularios/forms/get_runtime
        input_transforms:
          slug:
            type: javascript
            expr: flow_input.slug
          version:
            type: javascript
            expr: flow_input.version

    - id: execute_preload_hooks
      value:
        type: script
        path: f/formularios/forms/execute_hooks
        input_transforms:
          hooks:
            type: javascript
            expr: |
              results.get_runtime.config?.hooks?.preload || []
          context:
            type: javascript
            expr: |
              ({
                form_id: results.get_runtime.form_id,
                slug: results.get_runtime.slug,
                version: results.get_runtime.version,
                created_by: flow_input.created_by
              })

    - id: merge_preload_data
      value:
        type: script
        path: hub/3930/deno/inline_script
        content: |
          export async function main(preload_results: any, initial_data: any) {
            const merged = { ...(initial_data || {}) };
            
            for (const result of preload_results.results || []) {
              if (result.success && result.result?.data) {
                Object.assign(merged, result.result.data);
              }
            }
            
            return merged;
          }
        input_transforms:
          preload_results:
            type: javascript
            expr: results.execute_preload_hooks
          initial_data:
            type: javascript
            expr: flow_input.initial_data || {}

    - id: create_submission
      value:
        type: script
        path: f/formularios/forms/save_submission
        input_transforms:
          form_id:
            type: javascript
            expr: results.get_runtime.form_id
          version:
            type: javascript
            expr: results.get_runtime.version
          data:
            type: javascript
            expr: results.merge_preload_data
          status:
            type: javascript
            expr: "'draft'"
          created_by:
            type: javascript
            expr: flow_input.created_by || 'anonymous'

    - id: build_response
      value:
        type: script
        path: hub/3930/deno/inline_script
        content: |
          export async function main(runtime: any, data: any, submission: any) {
            return {
              schema: runtime.schema,
              config: runtime.config,
              data: data,
              submission_id: submission.id,
              form_id: runtime.form_id,
              version: runtime.version,
              metadata: {
                form_name: runtime.name,
                form_slug: runtime.slug,
                category: runtime.category
              }
            };
          }
        input_transforms:
          runtime:
            type: javascript
            expr: results.get_runtime
          data:
            type: javascript
            expr: results.merge_preload_data
          submission:
            type: javascript
            expr: results.create_submission
