services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iibb-frontend-dev
    ports:
      - "3011:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - VITE_AUTH_MODE=mock
      - VITE_WINDMILL_WORKSPACE=arba
      - VITE_FORMIO_URL=https://formio.mdsoluciones.ar
    restart: unless-stopped
    networks:
      - iibb-network

networks:
  iibb-network:
    driver: bridge
