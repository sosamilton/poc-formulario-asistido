services:

  mongo:
    image: mongo
    restart: always
    volumes:
      - mdb-data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME
      - MONGO_INITDB_ROOT_PASSWORD

  formio:
    image: formio/formio:4.6.0
    restart: always
    links:
      - mongo
    ports:
      - '3010:3001'
    environment:
      DEBUG: formio:*
      PORTAL_ENABLED: true
      NODE_CONFIG: '{"mongo": "mongodb://mongo:27017/formio"}'
      ROOT_EMAIL: admin@example.com
      ROOT_PASSWORD: CHANGEME
      ADMIN_KEY: seed-admin-key          # ← clave para operaciones admin
      JWT_SECRET: your-secret-key-change-this-in-production
      JWT_EXPIRE_TIME: 86400
    stdin_open: true
    tty: true

  seed:
    image: node:18-alpine
    depends_on:
      - formio
    volumes:
      - ./seed:/seed
    working_dir: /seed
    environment:
      FORMIO_URL:    http://formio:3001
      ROOT_EMAIL:    admin@example.com
      ROOT_PASSWORD: CHANGEME
      ADMIN_KEY:     seed-admin-key      # ← debe coincidir con formio
    command: node seed.js
    restart: on-failure

volumes:
  mdb-data: