summary: Calculate minimum amount for DDJJ
description: Applies business rules to determine minimum declaration amount
  based on regime and alicuota
lock: '!inline f/ddjj/calcular_periodo_minimo.script.lock'
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    alicuota:
      type: number
      description: Tax rate percentage
      default: 0
    regimen:
      type: string
      description: Tax regime (CM, LOCAL, ESPECIAL)
      default: ''
  required:
    - regimen
    - alicuota
