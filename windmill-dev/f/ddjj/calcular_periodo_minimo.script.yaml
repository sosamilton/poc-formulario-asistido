summary: Calcular monto mínimo para DDJJ
description: Aplica reglas de negocio para determinar el monto mínimo de declaración
  según régimen y alícuota
lock: '!inline f/ddjj/calcular_periodo_minimo.script.lock'
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    alicuota:
      type: number
      description: Porcentaje de tasa impositiva (alícuota)
      default: 0
    regimen:
      type: string
      description: Régimen impositivo (CM, LOCAL, ESPECIAL)
      default: ''
  required:
    - regimen
    - alicuota
