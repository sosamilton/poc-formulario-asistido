summary: Initialize DDJJ flow with JWT token
description: |
  Complete flow to process DDJJ initialization:
  1. Parse JWT token to extract CUIT
  2. Fetch padron data (taxpayer info)
  3. Fetch alicuota (tax rate) by activity code
  4. Fetch historical DDJJ data
  5. Fetch outstanding periods (periodos adeudados)
  6. Calculate minimum amount
  7. Create Form.io submission with precargado data

value:
  modules:
    - id: a
      value:
        type: rawscript
        content: ""
        language: deno
        path: f/ddjj/parse_jwt
        input_transforms:
          token:
            type: javascript
            expr: flow_input.token
      summary: Parse JWT and extract CUIT
    
    - id: b
      value:
        type: rawscript
        content: ""
        language: bun
        path: f/ddjj/fetch_padron
        input_transforms:
          cuit:
            type: javascript
            expr: results.a.cuit
      summary: Fetch padron data from Mockoon
    
    - id: c
      value:
        type: rawscript
        content: ""
        language: bun
        path: f/ddjj/fetch_alicuota
        input_transforms:
          codigoActividad:
            type: javascript
            expr: results.b.codigoActividad
      summary: Fetch alicuota by activity code
    
    - id: d
      value:
        type: rawscript
        content: ""
        language: bun
        path: f/ddjj/fetch_historial
        input_transforms:
          cuit:
            type: javascript
            expr: results.a.cuit
      summary: Fetch historical DDJJ data
    
    - id: e
      value:
        type: rawscript
        content: ""
        language: bun
        path: f/ddjj/fetch_periodos_adeudados
        input_transforms:
          cuit:
            type: javascript
            expr: results.a.cuit
      summary: Fetch outstanding periods
    
    - id: f
      value:
        type: rawscript
        content: ""
        language: bun
        path: f/ddjj/calcular_periodo_minimo
        input_transforms:
          regimen:
            type: javascript
            expr: results.b.regimen
          alicuota:
            type: javascript
            expr: results.c.alicuota
      summary: Calculate minimum amount
    
    - id: g
      value:
        type: rawscript
        content: ""
        language: bun
        path: f/ddjj/create_formio_submission
        input_transforms:
          data:
            type: javascript
            expr: |
              ({
                cuit: results.a.cuit,
                razonSocial: results.b.razonSocial,
                actividad: results.b.actividad,
                regimen: results.b.regimen,
                alicuota: results.c.alicuota,
                montoAnterior: results.d.montoAnterior,
                periodosAdeudados: results.e.periodosAdeudados,
                montoMinimo: results.f.montoMinimo
              })
      summary: Create Form.io submission

schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  required:
    - token
  properties:
    token:
      type: string
      description: JWT token from webhook request
      default: ""
