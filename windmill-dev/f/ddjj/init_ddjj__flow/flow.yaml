summary: Inicializar flujo de DDJJ con token JWT
description: |-
  Flujo completo para procesar la inicialización de DDJJ:
  1. Parsear token JWT para extraer CUIT
  2. Obtener datos del padrón (información del contribuyente)
  3. Obtener alícuota (tasa impositiva) por código de actividad
  4. Obtener datos históricos de DDJJ
  5. Obtener períodos adeudados (períodos sin DDJJ)
  6. Calcular monto mínimo
  7. Crear submission en Form.io con datos precargados
value:
  modules:
    - id: k
      value:
        type: script
        input_transforms:
          token:
            type: javascript
            expr: flow_input.token
        is_trigger: false
        path: f/ddjj/parse_jwt
    - id: parallel_fetch
      summary: Obtener datos en paralelo (padrón, historial, períodos)
      value:
        type: branchall
        branches:
          - summary: Obtener datos del padrón
            modules:
              - id: h
                value:
                  type: script
                  input_transforms:
                    cuit:
                      type: javascript
                      expr: results.k.cuit
                  is_trigger: false
                  path: f/ddjj/fetch_padron
            expr: ''
            parallel: true
            skip_failure: true
          - summary: Obtener datos históricos
            modules:
              - id: l
                value:
                  type: script
                  input_transforms:
                    cuit:
                      type: javascript
                      expr: results.k.cuit
                  is_trigger: false
                  path: f/ddjj/fetch_historial
            expr: ''
            parallel: true
            skip_failure: true
          - summary: Obtener períodos adeudados
            modules:
              - id: m
                value:
                  type: script
                  input_transforms:
                    cuit:
                      type: javascript
                      expr: results.k.cuit
                  is_trigger: false
                  path: f/ddjj/fetch_periodos_adeudados
            expr: ''
            parallel: true
            skip_failure: true
        parallel: true
    - id: n
      value:
        type: script
        input_transforms:
          codigoActividad:
            type: javascript
            expr: results.h.codigoActividad
        is_trigger: false
        path: f/ddjj/fetch_alicuota
    - id: o
      value:
        type: script
        input_transforms:
          data:
            type: javascript
            expr: |-
              {
                "cuit": results.k?.cuit ?? "",
                "razonSocial": results.h?.razonSocial ?? "",
                "actividad": results.h?.actividad ?? "",
                "regimen": results.h?.regimen ?? "",
                "alicuota": results.n?.alicuota ?? 0,
                "montoAnterior": results.l?.montoAnterior ?? null,
                "periodosAdeudados": results.m?.periodosAdeudados ?? [],
                "montoMinimo": 0
              }
        is_trigger: false
        path: f/ddjj/create_formio_submission
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - token
  properties:
    token:
      type: string
      description: 'Token JWT desde request de webhook. Generar uno usando: wmill script
        run f/ddjj/generate_test_jwt'
      default: GENERATE_TOKEN_FIRST_USING_f/ddjj/generate_test_jwt
  required:
    - token
