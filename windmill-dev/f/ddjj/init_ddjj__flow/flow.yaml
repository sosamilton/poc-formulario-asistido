summary: Initialize DDJJ flow with JWT token
description: |-
  Complete flow to process DDJJ initialization:
  1. Parse JWT token to extract CUIT
  2. Fetch padron data (taxpayer info)
  3. Fetch alicuota (tax rate) by activity code
  4. Fetch historical DDJJ data
  5. Fetch outstanding periods (periodos adeudados)
  6. Calculate minimum amount
  7. Create Form.io submission with precargado data
value:
  modules:
    - id: k
      value:
        type: script
        input_transforms:
          token:
            type: javascript
            expr: flow_input.token
        is_trigger: false
        path: f/ddjj/parse_jwt
    - id: parallel_fetch
      summary: Fetch data in parallel (padron, historial, periodos)
      value:
        type: branchall
        branches:
          - summary: Fetch padron data
            modules:
              - id: h
                value:
                  type: script
                  input_transforms:
                    cuit:
                      type: javascript
                      expr: results.k.cuit
                  is_trigger: false
                  path: f/ddjj/fetch_padron
            expr: ''
            parallel: true
            skip_failure: true
          - summary: Fetch historical data
            modules:
              - id: l
                value:
                  type: script
                  input_transforms:
                    cuit:
                      type: javascript
                      expr: results.k.cuit
                  is_trigger: false
                  path: f/ddjj/fetch_historial
            expr: ''
            parallel: true
            skip_failure: true
          - summary: Fetch outstanding periods
            modules:
              - id: m
                value:
                  type: script
                  input_transforms:
                    cuit:
                      type: javascript
                      expr: results.k.cuit
                  is_trigger: false
                  path: f/ddjj/fetch_periodos_adeudados
            expr: ''
            parallel: true
            skip_failure: true
        parallel: true
    - id: n
      value:
        type: script
        input_transforms:
          codigoActividad:
            type: javascript
            expr: results.h.codigoActividad
        is_trigger: false
        path: f/ddjj/fetch_alicuota
    - id: o
      value:
        type: script
        input_transforms:
          data:
            type: javascript
            expr: |-
              {
                "cuit": results.k?.cuit ?? "",
                "razonSocial": results.h?.razonSocial ?? "",
                "actividad": results.h?.actividad ?? "",
                "regimen": results.h?.regimen ?? "",
                "alicuota": results.n?.alicuota ?? 0,
                "montoAnterior": results.l?.montoAnterior ?? null,
                "periodosAdeudados": results.m?.periodosAdeudados ?? [],
                "montoMinimo": 0
              }
        is_trigger: false
        path: f/ddjj/create_formio_submission
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - token
  properties:
    token:
      type: string
      description: 'JWT token from webhook request. Generate one using: wmill script
        run f/ddjj/generate_test_jwt'
      default: GENERATE_TOKEN_FIRST_USING_f/ddjj/generate_test_jwt
  required:
    - token
