summary: Crear submission en Form.io con datos precargados
description: Crea un borrador de submission en Form.io con todos los datos recopilados
lock: '!inline f/ddjj/create_formio_submission.script.lock'
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    data:
      type: object
      description: Datos completos de la submission
      default: null
      format: resource-submission_data
      properties:
        actividad:
          type: string
          originalType: string
        alicuota:
          type: number
        cuit:
          type: string
          originalType: string
        montoAnterior:
          type: number
        montoMinimo:
          type: number
        periodosAdeudados:
          type: array
          items:
            type: string
          originalType: string[]
        razonSocial:
          type: string
          originalType: string
        regimen:
          type: string
          originalType: string
  required:
    - data
