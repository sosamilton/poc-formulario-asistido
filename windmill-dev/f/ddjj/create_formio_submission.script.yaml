summary: Create Form.io submission with precargado data
description: Creates a draft submission in Form.io with all collected data
lock: '!inline f/ddjj/create_formio_submission.script.lock'
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    data:
      type: object
      description: Complete submission data
      default: null
      format: resource-submission_data
      properties:
        actividad:
          type: string
          originalType: string
        alicuota:
          type: number
        cuit:
          type: string
          originalType: string
        montoAnterior:
          type: number
        montoMinimo:
          type: number
        periodosAdeudados:
          type: array
          items:
            type: string
          originalType: string[]
        razonSocial:
          type: string
          originalType: string
        regimen:
          type: string
          originalType: string
  required:
    - data
